<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bookGradientFav" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#A0522D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#654321;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pageGradientFav" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8DC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5DEB3;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="#f0ebe4"/>
  
  <!-- Book spine (left side) -->
  <rect x="60" y="50" width="15" height="100" fill="#6B3410"/>
  
  <!-- Book cover (right side) -->
  <path d="M 75 50 L 140 50 Q 145 50 145 55 L 145 145 Q 145 150 140 150 L 75 150 Z" 
        fill="url(#bookGradientFav)"/>
  
  <!-- Pages inside -->
  <path d="M 75 50 L 140 50 Q 145 50 145 55 L 145 145 Q 145 150 140 150 L 75 150 Z" 
        fill="url(#pageGradientFav)" opacity="0.6"/>
  
  <!-- Decorative spine lines -->
  <line x1="62" y1="65" x2="73" y2="65" stroke="#C19A6B" stroke-width="1" opacity="0.7"/>
  <line x1="62" y1="80" x2="73" y2="80" stroke="#D4AF37" stroke-width="1" opacity="0.7"/>
  <line x1="62" y1="95" x2="73" y2="95" stroke="#C19A6B" stroke-width="1" opacity="0.7"/>
  <line x1="62" y1="110" x2="73" y2="110" stroke="#D4AF37" stroke-width="1" opacity="0.7"/>
  <line x1="62" y1="125" x2="73" y2="125" stroke="#C19A6B" stroke-width="1" opacity="0.7"/>
  
  <!-- Central star emblem -->
  <g transform="translate(95, 90)">
    <line x1="0" y1="-8" x2="0" y2="8" stroke="#D4AF37" stroke-width="1.5" opacity="0.8"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#D4AF37" stroke-width="1.5" opacity="0.8"/>
    <line x1="-5" y1="-5" x2="5" y2="5" stroke="#D4AF37" stroke-width="1" opacity="0.7"/>
    <line x1="5" y1="-5" x2="-5" y2="5" stroke="#D4AF37" stroke-width="1" opacity="0.7"/>
    <circle cx="0" cy="0" r="3" fill="#D4AF37"/>
  </g>
  
  <!-- Corner dots -->
  <circle cx="82" cy="58" r="2" fill="#D4AF37" opacity="0.8"/>
  <circle cx="138" cy="58" r="2" fill="#D4AF37" opacity="0.8"/>
  <circle cx="82" cy="142" r="2" fill="#D4AF37" opacity="0.8"/>
  <circle cx="138" cy="142" r="2" fill="#D4AF37" opacity="0.8"/>
  
  <!-- Bookmark -->
  <path d="M 130 50 Q 132 80 128 110 Q 127 130 125 150" 
        stroke="#C41E3A" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.9"/>
</svg>