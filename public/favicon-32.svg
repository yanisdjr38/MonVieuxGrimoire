    <line x1="-3" y1="0" x2="3" y2="0" stroke="#D4AF37" stroke-width="1" opacity="0.8"/>
    <circle cx="0" cy="0" r="1.5" fill="#D4AF37"/>
  </g>
  
  <!-- Bookmark -->
